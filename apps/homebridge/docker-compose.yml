name: homebridge
version: '2'
services:
  homebridge:
    image: homebridge/homebridge@sha256:d26cf915f2e0a9aa6e8323116db87f55a74e3b488dbc5b782f7b878b12eade5a
    restart: always
    network_mode: host
    volumes:
    - /DATA/AppData/$AppID/config:/homebridge
    logging:
      driver: json-file
      options:
        max-size: 10mb
        max-file: '1'
x-casaos:
  main: homebridge
  icon: https://cdn.jsdelivr.net/gh/Dengwii/CasaOS-AppStore@gh-pages/apps/homebridge/assets/icon.png
  title:
    en_US: Homebridge
  index: /
  port_map: '8581'
  version: latest
