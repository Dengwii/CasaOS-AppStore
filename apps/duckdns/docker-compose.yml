name: duckdns
services:
  duckdns:
    image: lscr.io/linuxserver/duckdns@sha256:e73d36ae259e78f81f3ad7f54c712bd89f1330efa0a5904b9b67d93f502bbb70
    container_name: duckdns
    network_mode: host
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Etc/UTC
    - SUBDOMAINS=subdomain1,subdomain2
    - TOKEN=token
    - UPDATE_IP=ipv6
    - LOG_FILE=false
    volumes:
    - /DATA/AppData/duckdns:/config
    restart: unless-stopped
x-casaos:
  main: duckdns
  icon: https://cdn.jsdelivr.net/gh/Dengwii/CasaOS-AppStore@gh-pages/apps/duckdns/assets/icon.png
  title:
    en_US: duckdns
  index: /
  version: latest
