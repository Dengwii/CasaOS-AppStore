name: homebridge
version: '2'
services:
  homebridge:
    image: homebridge/homebridge:latest
    restart: always
    network_mode: host
    volumes:
    - /DATA/AppData/$AppID/config:/homebridge
    logging:
      driver: json-file
      options:
        max-size: 10mb
        max-file: '1'
x-casaos:
  main: homebridge
  icon: /apps/homebridge/assets/icon.png
  title:
    en_US: Homebridge
  index: /
  port_map: '8581'
  version: latest
